packages:
  - "packages/*"
  - "examples/*"
  - "website"
allowBuilds:
  '@biomejs/biome': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  cpu-features: false
  esbuild: true
  msgpackr-extract: false
  prisma: true
  protobufjs: false
  sharp: true
  ssh2: false
minimumReleaseAgeExclude:
  - '@dudousxd/nestjs-telescope@1.8.0'
  - '@dudousxd/nestjs-telescope@1.10.0'
  - '@dudousxd/nestjs-context@0.1.0'
