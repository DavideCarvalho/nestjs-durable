packages:
  - "packages/*"
  - "examples/*"
  - "website"
allowBuilds:
  '@biomejs/biome': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  cpu-features: false
  esbuild: true
  msgpackr-extract: false
  prisma: true
  protobufjs: false
  sharp: true
  ssh2: false
minimumReleaseAgeExclude:
  # First-party packages: the minimum-release-age policy guards against recently-published
  # THIRD-party (potentially compromised) deps — our own scope is exempt. Patterns match
  # package NAMES (globs), not name@version.
  - '@dudousxd/*'
